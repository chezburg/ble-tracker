<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>St. Joseph Hospital Asset Tracker Login</title>
  <meta name="description" content="Login for Asset tracker web interface for St. Joseph Hospital">
  <meta name="author" content="16-Tracking ES1050 Team">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" type="text/css" href="Menu_stylesheet.css">
  <link rel="icon" type="image/x-icon" href="st_joes_logo_curved_edges.png">
</head>
<body>

<form id="LoginForm" action="action_page.php" method="post">

  <div class="imgcontainer">
    <img src="st_joes_logo_curved_edges.png" alt="Hospital Logo" class="avatar">
    <div class="title">Asset Tracker</div>
  </div>

  <div class="container">
    <label for="uname"><b>Username</b></label>
    <input type="text" placeholder="Enter Username" id="username" name="uname" required>

    <label for="psw"><b>Password</b></label>
    <input type="password" placeholder="Enter Password" id="password" name="psw" required>

    <button type="submit">Login</button>
  </div>

  <div id="message"></div>
</form>

<script>
  // Reference the form and the message area so we can manipulate them with JS
  const logInForm = document.getElementById('LoginForm');
  const messageDiv = document.getElementById('message');

  // Triggered when the user clicks the "Login" button
  logInForm.addEventListener('submit', async (e) => {
    // Stop the page from refreshing automatically so we can handle the login via API
    e.preventDefault();

    // Package the user's input into a clean object to send to our server
    const loginData = {
      username: document.getElementById('username').value,
      password: document.getElementById('password').value,
    };

    try {
      // Attempt to connect to the local server's login endpoint
      const response = await fetch('http://localhost:3000/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(loginData) // Convert JS object to JSON string for the server
      });

      const result = await response.json();

      // Check if the server verified the credentials (HTTP 200 OK)
      if (response.ok) {
        // Security: Save the unique session token so the user stays logged in
        localStorage.setItem('token', result.token);

        // Role-Based Access Control: Check if the user is IT/Admin or general Staff
        const roleToSave = result.role ? result.role.toLowerCase().trim() : "";
        localStorage.setItem('role', roleToSave);

        // Feedback for the user
        messageDiv.textContent = "Login successful! Redirecting...";
        messageDiv.style.color = "green";

        // Short delay before moving to the dashboard to ensure data is saved locally
        setTimeout(() => {
          if (roleToSave === "it" || roleToSave === "admin") {
            // High-level access (managing assets/system)
            window.location.href = "ITMain.html";
          } else {
            // Standard access (viewing/tracking)
            window.location.href = "StaffMain.html";
          }
        }, 500);

      } else {
        // If the server rejected the login (wrong password, etc.), show the reason
        messageDiv.textContent = result.message;
        messageDiv.style.color = "red";
      }
    } catch (error) {
      // Handles connection failures (like if the Node.js server isn't running)
      console.error("Connection error:", error);
      messageDiv.textContent = "Connection error. Ensure backend is running on port 3000.";
      messageDiv.style.color = "red";
    }
  });
</script>
</body>
</html>
