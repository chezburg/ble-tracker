<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    <!-- Make sure you put this AFTER Leaflet's CSS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;        /* ADD THIS - prevents any scroll space */
            background-color: white;
        }

        #map {
            width: 100%;
            height: 100%;
            display: block;
            margin: 0;               /* ADD THIS - explicit zero margin */
            padding: 0;              /* ADD THIS - explicit zero padding */
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="status" style="position:fixed; top:10px; right:10px; background:rgba(255,255,255,0.8); padding:5px 10px; border-radius:5px; font-family:sans-serif; font-size:12px; z-index:1000; border:1px solid #ccc;">
    Last update: <span id="lastUpdate">Never</span>
</div>
<script>

    var map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: 6.80
    });
    var bounds = [[0,0], [8.5,11]]; //bounds are set like a4 paper, the size of the png scale is 1:100 inches like the drawing
    var image = L.imageOverlay('ACEB 2440 Prototype Testing Map - calibrated left bottom.png', bounds).addTo(map);
    map.fitBounds(bounds);

    var marker = L.marker([2.75,3]).addTo(map); //this reference point is the corner of the actual room, it's formatted as [y,x] coordinates b/c leaflet started as world maps

    map.fitBounds(bounds, { padding: [0, 0] });  // ADD padding option
    // Custom red dot marker
    var dotIcon = L.divIcon({
        className: 'custom-dot',
        html: '<div style="width:12px;height:12px;background:red;border-radius:50%;"></div>',
        iconSize: [12, 12]
    });

    // Initial position (can be anything)
    var marker = L.marker([2.75, 3], { icon: dotIcon }).addTo(map);

    // Function to fetch data from backend
    async function updatePosition() {
        try {
            const res = await fetch("/position");
            // Uses relative path to talk to the same server hosting the page

            const data = await res.json();

            // Move marker (Leaflet uses [y, x])
            marker.setLatLng([data.y, data.x]);

            // Update floor display if exists
            if (document.getElementById("floorText")) {
                document.getElementById("floorText").innerText =
                    "Floor: " + data.floor;
            }

            // Update last update timestamp
            document.getElementById("lastUpdate").innerText = new Date().toLocaleTimeString();
            document.getElementById("status").style.backgroundColor = "rgba(255,255,255,0.8)";

        } catch (err) {
            console.error("Fetch error:", err);
        }
    }

    // Update every 0.5 seconds
    setInterval(updatePosition, 500);
</script>
</body>
</html>
