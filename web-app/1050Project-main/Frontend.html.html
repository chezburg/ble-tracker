<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
  <!-- Make sure you put this AFTER Leaflet's CSS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <style>
    #map {
    width: auto;
    height: 800px;
     }
  </style>
</head>
<body>
<div id="map"></div>
<script>
  var map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: 6.5
});
  var bounds = [[0,0], [8.5,11]]; //bounds are set like a4 paper, the size of the png scale is 1:100 inches like the drawing
var image = L.imageOverlay('ACEB 2440 Prototype Testing Map - calibrated left bottom.png', bounds).addTo(map);
map.fitBounds(bounds);

  var marker = L.marker([2.75,3]).addTo(map); //this reference point is the corner of the actual room, it's formatted as [y,x] coordinates b/c leaflet started as world maps


// Custom red dot marker
var dotIcon = L.divIcon({
  className: 'custom-dot',
  html: '<div style="width:12px;height:12px;background:red;border-radius:50%;"></div>',
  iconSize: [12, 12]
});

// Initial position (can be anything)
var marker = L.marker([2.75, 3], { icon: dotIcon }).addTo(map);

// Function to fetch data from backend
async function updatePosition() {
  try {
    const res = await fetch("http://192.168.1.100:3000/position"); 
    //Replace with your server IP

    const data = await res.json();

    // Move marker (Leaflet uses [y, x])
    marker.setLatLng([data.y, data.x]);

    // Update marker to display the floor
    marker.bindPopup("Floor; " + data.floor);
    }

  } catch (err) {
    console.error("Fetch error:", err);
  }
}

// Update every 0.5 seconds
setInterval(updatePosition, 500);
</script>
</body>
</html>
